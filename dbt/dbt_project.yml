name: "dbt_btc"
version: "1.0.0"
config-version: 2

profile: "dbt_btc"

model-paths:
  - "models"
  - "intermediate"
  - "marts"

macro-paths:
  - "macros"

test-paths:
  - "tests"

target-path: "target"

clean-targets:
  - "target"
  - "dbt_packages"

models:
  dbt_btc:

    stg_ohlcv:
      +materialized: view

    int_btc_base_returns:
      +materialized: view
    int_btc_ichimoku:
      +materialized: view
    int_btc_features:
      +materialized: view

    feature_store:
      features:
        +schema: feature_store
        +materialized: incremental
      labels:
        +schema: feature_store
        +materialized: incremental
