name: "dbt_btc"
version: "1.0.0"
config-version: 2

profile: "dbt_btc"

model-paths:
  - "models"
  - "intermediate"
  - "marts"

macro-paths:
  - "macros"

test-paths:
  - "tests"

target-path: "target"

clean-targets:
  - "target"
  - "dbt_packages"

models:
  dbt_btc:
    stg_ohlcv:
      +schema: staging
      +materialized: view

    int_btc_base_returns:
      +schema: intermediate
      +materialized: view

    int_btc_ichimoku:
      +schema: intermediate
      +materialized: view

    int_btc_features:
      +schema: intermediate
      +materialized: view

    feature_store:
      +schema: feature_store
      +materialized: incremental