# .github/workflows/deploy.yml
name: Build & Deploy BTC Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'ELT/**'
      - 'dbt/**'
      - 'requirements.txt'
      - 'dockerfile'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build & Push image
        run: |
          gcloud builds submit \
            --tag us-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pipelines/feature-store-etl \
            --region us-central1

      - name: Update Cloud Run Job
        run: |
          gcloud run jobs update btc-pipeline \
            --image us-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pipelines/feature-store-etl \
            --region us-central1 \
            --set-env-vars GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},\
                           GCP_LOCATION=${{ vars.GCP_LOCATION }},\
                           GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }},\
                           GCS_URI=${{ secrets.GCS_URI }},\
                           GCS_PREFIX=${{ vars.GCS_PREFIX }},\
                           BQ_CONNECTION_ID=${{ vars.BQ_CONNECTION_ID }},\
                           BQ_TABLE_NAME=${{ vars.BQ_TABLE_NAME }},\
                           BQ_DATASET=${{ vars.BQ_DATASET }}

      - name: Deploy Streamlit Monitoring
        run: |
          gcloud run deploy monitoring-dashboard \
            --source streamlit/ \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},\
                           GCP_LOCATION=${{ vars.GCP_LOCATION }},\
                           BQ_DATASET=${{ vars.BQ_DATASET }},\
                           BQ_TABLE_NAME=${{ vars.BQ_TABLE_NAME }}